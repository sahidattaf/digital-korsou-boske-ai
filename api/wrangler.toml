name = "digital-korsou-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "development"

# Production secrets (set via wrangler secret put)
# OPENAI_API_KEY
# NOTION_API_KEY

[env.production]
name = "digital-korsou-api-prod"
vars = { ENVIRONMENT = "production" }

[env.staging]
name = "digital-korsou-api-staging"
vars = { ENVIRONMENT = "staging" }
